services:
  postgres:
    image: postgres:15-alpine
    container_name: rfe-mcp-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rfe-network

  rfe-mcp-server:
    build:
      context: .
      dockerfile: Containerfile
    container_name: rfe-mcp-server
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "-k", "http://0.0.0.0:5001/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rfe-network

volumes:
  postgres_data:
    driver: local

networks:
  rfe-network:
    driver: bridge
