# Labels applied automatically to PRs based on changed file paths.
# Used by .github/workflows/labeler.yml

area/tools:
  - changed-files:
      - any-glob-to-any-file: "rfe_mcp_server/src/tools/**"

area/core:
  - changed-files:
      - any-glob-to-any-file:
          - "rfe_mcp_server/src/main.py"
          - "rfe_mcp_server/src/api.py"
          - "rfe_mcp_server/src/mcp.py"
          - "rfe_mcp_server/src/settings.py"

area/oauth:
  - changed-files:
      - any-glob-to-any-file: "rfe_mcp_server/src/oauth/**"

area/storage:
  - changed-files:
      - any-glob-to-any-file: "rfe_mcp_server/src/storage/**"

area/utils:
  - changed-files:
      - any-glob-to-any-file: "rfe_mcp_server/utils/**"

area/tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

area/ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".pre-commit-config.yaml"

area/deployment:
  - changed-files:
      - any-glob-to-any-file:
          - "deployment/**"
          - "Containerfile"
          - "compose.yaml"

area/docs:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "examples/**"

area/config:
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - "Makefile"
          - ".env.example"
