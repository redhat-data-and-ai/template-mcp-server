name: Bug Report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels: ["type/bug", "status/triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I call the multiply tool with...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start the server with `make local`
        2. Send a request to `/mcp` with payload...
        3. Observe the error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or logs if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the server are you running?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport protocol
      description: Which transport protocol are you using?
      options:
        - streamable-http
        - sse
        - http
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide details about your environment.
      placeholder: |
        - OS: macOS 15.2 / Ubuntu 24.04 / etc.
        - Python: 3.12.2
        - Deployment: local / container / OpenShift
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be formatted as code automatically.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am using a supported Python version (3.12+).
          required: false
