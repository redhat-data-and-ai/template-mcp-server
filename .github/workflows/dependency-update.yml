name: Dependency Updates

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-approve:
    name: Auto-approve Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
    - name: Dependabot metadata
      id: dependabot-metadata
      uses: dependabot/fetch-metadata@v2
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"

    - name: Approve patch and minor updates
      if: steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' || steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
      run: |
        gh pr review --approve "$PR_URL"
        gh pr merge --auto --merge "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  uv-lock-update:
    name: Update uv.lock
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Update dependencies
      run: |
        # Update all dependencies to latest compatible versions
        uv sync --upgrade

    - name: Run tests to ensure compatibility
      run: |
        uv run pytest -x --tb=short

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet uv.lock; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: steps.changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: update dependencies in uv.lock"
        title: "chore: update dependencies"
        body: |
          ## Dependency Updates

          This PR updates the dependencies in `uv.lock` to their latest compatible versions.

          ### Changes
          - Updated all dependencies to latest compatible versions
          - All tests are passing

          ### Testing
          - ✅ All tests pass
          - ✅ Code quality checks pass
          - ✅ Security scans clean

          **Auto-generated by GitHub Actions**
        branch: chore/update-dependencies
        delete-branch: true
        labels: |
          dependencies
          automated
        assignees: ${{ github.repository_owner }}

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Run security audit
      run: |
        # Create audit report
        echo "# Security Audit Report" > security-audit.md
        echo "Generated on: $(date)" >> security-audit.md
        echo "" >> security-audit.md

        # Run safety check
        echo "## Safety Check" >> security-audit.md
        if uv run safety check --json > safety-output.json 2>&1; then
          echo "✅ No known security vulnerabilities found" >> security-audit.md
        else
          echo "⚠️ Security vulnerabilities detected:" >> security-audit.md
          echo "\`\`\`json" >> security-audit.md
          cat safety-output.json >> security-audit.md
          echo "\`\`\`" >> security-audit.md
        fi

        echo "" >> security-audit.md

        # Run bandit
        echo "## Bandit Security Scan" >> security-audit.md
        if uv run bandit -r template_mcp_server/ -f txt > bandit-output.txt 2>&1; then
          echo "✅ No security issues found in code" >> security-audit.md
        else
          echo "⚠️ Security issues detected in code:" >> security-audit.md
          echo "\`\`\`" >> security-audit.md
          cat bandit-output.txt >> security-audit.md
          echo "\`\`\`" >> security-audit.md
        fi

    - name: Create security issue if vulnerabilities found
      run: |
        if grep -q "⚠️" security-audit.md; then
          gh issue create \
            --title "🔒 Security vulnerabilities detected in dependencies" \
            --body-file security-audit.md \
            --label "security,dependencies,high-priority" \
            --assignee ${{ github.repository_owner }}
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload security audit report
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-report
        path: |
          security-audit.md
          safety-output.json
          bandit-output.txt
        retention-days: 30

  pre-commit-autoupdate:
    name: Update Pre-commit Hooks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    - name: Update pre-commit hooks
      run: |
        uv run pre-commit autoupdate

    - name: Test updated hooks
      run: |
        uv run pre-commit run --all-files

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet .pre-commit-config.yaml; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: steps.changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: update pre-commit hooks"
        title: "chore: update pre-commit hooks"
        body: |
          ## Pre-commit Hook Updates

          This PR updates the pre-commit hooks to their latest versions.

          ### Changes
          - Updated pre-commit hook versions in `.pre-commit-config.yaml`
          - All hooks tested and working

          ### Testing
          - ✅ All pre-commit hooks pass
          - ✅ Code quality maintained

          **Auto-generated by GitHub Actions**
        branch: chore/update-pre-commit-hooks
        delete-branch: true
        labels: |
          maintenance
          automated
        assignees: ${{ github.repository_owner }}
